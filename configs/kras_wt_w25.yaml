mode: run

data:
  pdb_path: /home/qshao/WT/WT-sol6.trr
  topology_path: /home/qshao/WT/WT-sol6.gro
  window_size: 25
  horizon_size: 1
  stride: 1
  time_step: 200.0        # ps per frame (dt=0.002 ps, nstxout=100000)
  preprocess: align       # remove rigid-body rotation/translation

model:
  family: influence
  hidden_dim: 64
  residue_layers: 2
  pair_layers: 1
  dropout: 0.1

training:
  epochs: 100
  learning_rate: 0.001
  sparsity_weight: 0.01
  consistency_weight: 0.0
  validation_fraction: 0.1
  patience: 20
  device: cuda

scoring:
  top_k: 30

output:
  model_path: /home/qshao/allostery/outputs/kras_wt_w25/influence_model.pt
  score_csv_path: /home/qshao/allostery/outputs/kras_wt_w25/influence_scores.csv
