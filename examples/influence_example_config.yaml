mode: run

data:
  pdb_path: ../tests/fixtures/tiny_trajectory.pdb
  window_size: 3
  horizon_size: 1
  stride: 1
  time_step: 1.0

model:
  family: influence
  hidden_dim: 16
  residue_layers: 2
  pair_layers: 1
  dropout: 0.0

training:
  epochs: 5
  learning_rate: 0.001
  consistency_weight: 0.0
  sparsity_weight: 0.01

scoring:
  top_k: 10

output:
  model_path: ../outputs/influence_example_model.pt
  score_csv_path: ../outputs/influence_example_scores.csv
